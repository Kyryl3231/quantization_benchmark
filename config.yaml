project:
  name: quantization-benchmark
  seed: 42
  device: auto
  output_dir: results
  cache_dir: .cache
  env_path: .env

models:
  # baseline_model_id: Qwen/Qwen3-0.6B
  baseline_model_id: meta-llama/Llama-3.2-1B-Instruct

benchmark:
  mode: quick
  quick_limit: 3 # per-subject limit for MMLU
  prompt_count: 16
  max_new_tokens: 64
  do_sample: false # false for greedy decoding
  few_shot_k: 5 # number of few-shot examples for MMLU

awq:
  zero_point: true
  calibration_max_length: 512

bitsandbytes:
  quant_name: "nf4" # options: fp16, int8, nf4

gptq:
  bits: 8
  calibration_max_length: 512
